apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
data:
  mosquitto.conf: |
    pid_file /var/lib/mosquitto/mosquitto.pid

    listener 1883
    allow_anonymous true

    listener 9001
    protocol websockets
    allow_anonymous true

    persistence true
    persistence_location /var/lib/mosquitto/
    log_dest stdout
