apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mosquitto-websockets
spec:
  parentRefs:
    - name: default       # replace with your Gateway name
      namespace: default  # replace with your Gateway namespace
  hostnames:
    - mqtt.example.com    # replace with your hostname
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mosquitto
          port: 9001
